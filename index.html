<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Dashboard Financeiro Familiar v2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#f5f4ef;--card:#fff;--text:#1f2428;--muted:#65707a;--line:#d8d5cb;--brand:#0f766e;--neg:#ab2d25;--pos:#0d7a3b;--radius:14px;--shadow:0 10px 24px rgba(0,0,0,.07);--last:#3ba7ff;}
*{box-sizing:border-box;min-width:0;} html,body{margin:0;padding:0;overflow-x:hidden;}
body{font-family:Manrope,sans-serif;color:var(--text);background:radial-gradient(900px 320px at 100% -10%,#d9e9e5 0%,transparent 70%),radial-gradient(800px 280px at -10% -10%,#ece7d9 0%,transparent 70%),var(--bg)}
.container{max-width:1320px;margin:0 auto;padding:16px 12px 28px}.kicker{margin:0;font:600 11px 'IBM Plex Mono',monospace;color:var(--muted);letter-spacing:.08em;text-transform:uppercase}h1{margin:4px 0 2px;font-size:clamp(24px,5vw,38px);line-height:1.05}.subtitle{margin:0;color:var(--muted);font-size:14px}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
.kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 0}.k{padding:10px 12px}.k .l{font-size:10px;text-transform:uppercase;color:var(--muted);letter-spacing:.05em}.k .v{margin-top:2px;font-size:24px;font-weight:800}
.filters{padding:10px;display:grid;gap:8px}
.row{display:grid;grid-template-columns:1fr;gap:8px}
label{font-size:10px;text-transform:uppercase;color:var(--muted);letter-spacing:.05em;margin-bottom:4px;display:block}
input,select,button{border:1px solid var(--line);border-radius:10px;padding:10px;font:inherit;background:#fff;color:var(--text);width:100%}button{cursor:pointer;border:none;background:var(--brand);color:#fff;font-weight:700}
.chips{display:flex;gap:8px;flex-wrap:wrap}.chip-btn{border:1px solid var(--line);background:#fff;color:var(--text);border-radius:999px;padding:7px 12px;font-size:12px;font-weight:700;cursor:pointer}.chip-btn.active{background:var(--brand);border-color:var(--brand);color:#fff}
.card-select-top{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}.small-btn{border:1px solid var(--line);border-radius:8px;padding:6px 10px;font-size:12px;background:#fff;cursor:pointer}
.card-options{display:grid;grid-template-columns:1fr;gap:6px;max-height:150px;overflow:auto;border:1px solid var(--line);border-radius:10px;padding:8px;background:#fafaf8}.card-opt{display:flex;align-items:center;gap:8px;font-size:13px}.card-opt input{width:auto;margin:0}
.split{display:grid;grid-template-columns:1fr;gap:10px;margin:10px 0}.panel{padding:10px}.panel h3{margin:0 0 8px;font-size:13px;text-transform:uppercase;color:var(--muted);letter-spacing:.04em}
.bar-list{display:grid;gap:7px}.bar-row{display:grid;grid-template-columns:1.4fr 2fr auto;gap:8px;align-items:center}.bar-label{font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.bar-track{height:8px;background:#edf0eb;border-radius:999px;overflow:hidden}.bar-fill{height:100%;background:linear-gradient(90deg,#0f766e,#2ea397)}.bar-val{font:600 11px 'IBM Plex Mono',monospace;color:var(--muted)}
.reco-table{width:100%;border-collapse:collapse}.reco-table th,.reco-table td{padding:6px 8px;border-bottom:1px solid #ecebe4;font-size:12px;text-align:left;vertical-align:top}.reco-table th{font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted)}.ok{color:var(--pos);font-weight:700}.warn{color:#a16e00;font-weight:700}.reco-empty{padding:8px;border:1px solid #ecebe4;border-radius:8px;color:var(--muted);font-size:12px}
.table-head{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;border-bottom:1px solid var(--line);color:var(--muted);font-size:12px}.table-wrap{max-height:56vh;overflow:auto}
table{width:100%;min-width:1200px;border-collapse:collapse}th,td{padding:8px 9px;border-bottom:1px solid #efeee8;text-align:left;font-size:12px;vertical-align:top}th{position:sticky;top:0;z-index:1;background:#faf9f5;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;font-size:10px;cursor:pointer}
.mono{font-family:'IBM Plex Mono',monospace;font-size:11px}.tag{display:inline-block;border-radius:999px;padding:2px 8px;font-size:10px;font-weight:700}.deb{background:#fdeceb;color:var(--neg)}.cre{background:#ecf8ef;color:var(--pos)}.tag-fat{background:#eef5fb;color:#35516d;border:1px solid #ccdfef}.vpos{color:var(--pos);font-weight:700}.vneg{color:var(--neg);font-weight:700}.parcela-last{color:var(--last);font-weight:800}
@media (min-width:920px){.kpis{grid-template-columns:repeat(6,1fr)}.row.cols6{grid-template-columns:2fr repeat(5,1fr)}.split{grid-template-columns:1.2fr 1fr}.card-options{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div class="container">
  <p class="kicker">Financeiro Familiar</p>
  <h1>Dashboard Executivo v2</h1>
  <p class="subtitle">Com separação de faturas e conciliação entre cartão e conta corrente.</p>

  <section class="kpis" id="kpis"></section>

  <section class="card filters">
    <div class="row cols6">
      <div><label>Busca</label><input id="q" placeholder="descricao, plataforma, categoria"/></div>
      <div><label>Banco</label><select id="banco"></select></div>
      <div><label>Produto</label><select id="produto"></select></div>
      <div><label>Titular</label><select id="titular"></select></div>
      <div><label>Centro Custo</label><select id="cc"></select></div>
      <div><label>Categoria</label><select id="macro"></select></div>
    </div>

    <div>
      <label>Referência da Fatura</label>
      <div id="fatref-chips" class="chips"></div>
    </div>

    <div>
      <label>Cartões/Contas (multi-seleção)</label>
      <div class="card-select-top">
        <button type="button" id="cards-all" class="small-btn">Selecionar todos</button>
        <button type="button" id="cards-none" class="small-btn">Limpar seleção</button>
      </div>
      <div id="card-options" class="card-options"></div>
    </div>

    <div class="row" style="grid-template-columns:1fr 1fr;">
      <div><label>Parcelado</label><select id="parcelado"><option value="">Todos</option><option value="true">Sim</option><option value="false">Nao</option></select></div>
      <div><label>&nbsp;</label><button id="reset">Limpar filtros</button></div>
    </div>
  </section>

  <section class="split">
    <div class="card panel"><h3>Top Categorias (Valor)</h3><div id="bars-macro" class="bar-list"></div></div>
  </section>
  <section class="card panel" style="margin:10px 0;">
    <h3>Conciliação Cartão x Conta</h3>
    <div id="reco-list" class="bar-list"></div>
  </section>

  <section class="card">
    <div class="table-head"><span id="count">0 registros</span><span class="mono">Clique no cabeçalho para ordenar</span></div>
    <div class="table-wrap"><table><thead><tr id="head"></tr></thead><tbody id="body"></tbody></table></div>
  </section>
</div>

function buildCardOptions(){
  const map=new Map(); DATA.forEach(r=>{const k=cardKey(r); if(!map.has(k)) map.set(k, cardLabel(r));});
  const entries=[...map.entries()].sort((a,b)=>a[1].localeCompare(b[1],'pt-BR'));
  if(selectedCards.size===0) entries.forEach(([k])=>selectedCards.add(k));
  el.cardOptions.innerHTML=entries.map(([k,label])=>`<label class="card-opt"><input type="checkbox" data-card="${k}" ${selectedCards.has(k)?'checked':''}/><span>${label}</span></label>`).join('');

function pass(r){

  if(selectedFatRef && r.fatura_referencia_vencimento!==selectedFatRef) return false;
  if(selectedCards.size>0 && !selectedCards.has(cardKey(r))) return false;
  if(el.banco.value && r.banco!==el.banco.value) return false;
  if(el.produto.value && r.produto!==el.produto.value) return false;
  if(el.titular.value && r.eixo_titular!==el.titular.value) return false;

function groupBars(rows,key,top=8){const m=new Map();rows.forEach(r=>{const k=String(r[key]||'Sem Classificacao');m.set(k,(m.get(k)||0)+n(r.valor_brl));});return [...m.entries()].sort((a,b)=>Math.abs(b[1])-Math.abs(a[1])).slice(0,top);}
function drawBars(target,data){const max=Math.max(...data.map(d=>Math.abs(d[1])),1);target.innerHTML=data.map(([k,v])=>`<div class="bar-row"><div class="bar-label" title="${k}">${k}</div><div class="bar-track"><div class="bar-fill" style="width:${Math.max(4,(Math.abs(v)/max)*100).toFixed(1)}%"></div></div><div class="bar-val">${money.format(v)}</div></div>`).join('');}

function renderKPIs(rows){
  const total=rows.length,soma=rows.reduce((a,r)=>a+n(r.valor_brl),0),deb=rows.filter(r=>String(r.sinal).toUpperCase()==='DEBITO').reduce((a,r)=>a+n(r.valor_brl),0),cre=rows.filter(r=>String(r.sinal).toUpperCase()==='CREDITO').reduce((a,r)=>a+n(r.valor_brl),0),parc=rows.filter(r=>String(r.eh_parcelado).toLowerCase()==='true').length,fats=new Set(rows.map(r=>r.fatura_chave)).size;
  const card=(l,v)=>`<article class="card k"><div class="l">${l}</div><div class="v">${v}</div></article>`;
  el.kpis.innerHTML=[card('Registros',total.toLocaleString('pt-BR')),card('Faturas no filtro',fats.toLocaleString('pt-BR')),card('Saldo liquido',money.format(soma)),card('Debitos',money.format(deb)),card('Creditos',money.format(cre)),card('Parcelados',parc.toLocaleString('pt-BR'))].join('');
}

function computeReconciliacao(){
  const refs = selectedFatRef ? [selectedFatRef] : uniq('fatura_referencia_vencimento');
  const bancos = el.banco.value ? [el.banco.value] : uniq('banco');
  const items=[];

  bancos.forEach(b=>{
    refs.forEach(ref=>{
      const cardRows = DATA.filter(r=>
        r.banco===b && r.fatura_referencia_vencimento===ref && r.produto==='Cartao de Credito' && String(r.sinal).toUpperCase()==='DEBITO' && (selectedCards.size===0 || selectedCards.has(cardKey(r)))
      );
      const ccPayRows = DATA.filter(r=>
        r.banco===b && r.fatura_referencia_vencimento===ref && r.produto==='Conta Corrente' && r.categoria_subcategoria==='Pagamento Fatura Cartao'
      );
      if(cardRows.length===0 && ccPayRows.length===0) return;

      const cardTotal = cardRows.reduce((a,r)=>a+n(r.valor_brl),0);
      const payTotal = ccPayRows.reduce((a,r)=>a+Math.abs(n(r.valor_brl)),0);
      const diff = payTotal-cardTotal;
      const ok = Math.abs(diff)<=0.01;
      const descr = [...new Set(ccPayRows.map(r=>r.descricao_original).filter(Boolean))].join(' | ') || 'Sem pagamento identificado';

      const dates = cardRows.map(r=>r.data_compra_iso).filter(Boolean).sort();
      const cicloTxt = dates.length ? `${dates[0]} a ${dates[dates.length-1]}` : 'Sem lançamentos de cartão no recorte';

      items.push({banco:b,ref,cardTotal,payTotal,diff,ok,descr,cicloTxt});
    });
  });

  items.sort((a,b)=>monthOrder(a.ref)-monthOrder(b.ref));
  return items;
}

function renderReconciliacao(){
  const items = computeReconciliacao();
  if(items.length===0){el.recoList.innerHTML='<div class="reco-empty">Sem dados de conciliação para o filtro atual.</div>'; return;}
  el.recoList.innerHTML = `
    <table class="reco-table">
      <thead>
        <tr>
          <th>Banco</th>
          <th>Ref.</th>
          <th>Cartão (R$)</th>
          <th>Conta (R$)</th>
          <th>Dif. (R$)</th>
          <th>Status</th>
          <th>Vínculo</th>
        </tr>
      </thead>
      <tbody>
        ${items.map(i=>`
          <tr>
            <td>${i.banco}</td>
            <td>${i.ref}</td>
            <td>${money.format(i.cardTotal)}</td>
            <td>${money.format(i.payTotal)}</td>
            <td>${money.format(i.diff)}</td>
            <td><span class="${i.ok?'ok':'warn'}">${i.ok?'Conciliado':'Ajustar'}</span></td>
            <td title="${i.cicloTxt}">Pagamento Fatura Cartao -> ${i.descr || 'N/D'} -> Conta Corrente</td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;
}

function buildHead(){el.head.innerHTML=COLUMNS.map(c=>`<th data-k="${c}">${c.replaceAll('_',' ')}</th>`).join('');el.head.querySelectorAll('th').forEach(th=>th.onclick=()=>{const k=th.dataset.k;sortDir=(sortKey===k&&sortDir==='asc')?'desc':'asc';sortKey=k;render();});}
function isLastInstallment(txt){const m=/^(\d{2})\/(\d{2})$/.exec(String(txt||'')); if(!m) return false; return Number(m[1])===Number(m[2]);}

function renderTable(rows){
  el.count.textContent=`${rows.length.toLocaleString('pt-BR')} registros`;
  el.body.innerHTML=rows.map(r=>`<tr>
      <td class="mono">${r.data_compra_iso||''}</td>
      <td><span class="tag tag-fat">${r.fatura_referencia_vencimento||'Sem ref.'}</span></td>
      <td>${r.banco||''}</td>
      <td>${r.produto||''}</td>
      <td class="mono">${r.cartao_final||''}</td>
      <td>${r.eixo_titular||''}</td>
      <td>${r.categoria_macro||''}</td>
      <td>${r.categoria_subcategoria||''}</td>
      <td>${r.descricao_original||''}</td>
      <td class="mono ${isLastInstallment(r.parcela_texto)?'parcela-last':''}">${r.parcela_texto||''}</td>
      <td><span class="tag ${String(r.sinal).toUpperCase()==='CREDITO'?'cre':'deb'}">${r.sinal||''}</span></td>
      <td class="${n(r.valor_brl)<0?'vneg':'vpos'}">${money.format(n(r.valor_brl))}</td>
      <td class="mono">${r.id_lancamento_sistema||''}</td>
    </tr>`).join('');
}

function render(){
  const rows=DATA.filter(pass).sort(comp);
  renderKPIs(rows);
  drawBars(el.barsMacro,groupBars(rows,'categoria_macro',9));
  renderReconciliacao();
  renderTable(rows);
}

function wire(){[el.q,el.banco,el.produto,el.titular,el.cc,el.macro,el.parcelado].forEach(x=>x.addEventListener('input',render));el.reset.onclick=()=>{el.q.value='';el.banco.value='';el.produto.value='';el.titular.value='';el.cc.value='';el.macro.value='';el.parcelado.value='';selectedFatRef='';buildFaturaChips();selectedCards.clear();buildCardOptions();sortKey='data_compra_iso';sortDir='asc';render();};}

function init(){fill(el.banco,'banco');fill(el.produto,'produto');fill(el.titular,'eixo_titular');fill(el.cc,'eixo_centro_custo');fill(el.macro,'categoria_macro');buildFaturaChips();buildCardOptions();buildHead();wire();render();}
init();
</script>
</body>
